<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 30 30" xml:space="preserve">

<defs>
  <style type="text/css">
    .bg{fill:#2D2D2D;stroke:#FFFFFF;stroke-width:0.6;}
    .bot{fill:#FFFFFF;}

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</defs>

<!-- Background -->
<rect x="1.5" y="1.5" width="27" height="27" rx="4" class="bg"/>

<!-- Robot -->
<g class="pulse">

  <!-- Head -->
  <rect x="7" y="9" width="16" height="12" rx="3" class="bot"/>

  <!-- Eyes -->
  <circle cx="11" cy="15" r="1.2" fill="#2D2D2D"/>
  <circle cx="19" cy="15" r="1.2" fill="#2D2D2D"/>

  <!-- Mouth -->
  <rect x="12" y="18" width="6" height="1.5" rx="0.7" fill="#2D2D2D"/>

  <!-- Antenna -->
  <line x1="15" y1="9" x2="15" y2="6.5" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="15" cy="5.5" r="1" fill="#FFFFFF"/>

</g>

</svg>
